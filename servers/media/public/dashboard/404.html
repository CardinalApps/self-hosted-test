<!DOCTYPE html>
<html lang="en">
  <head>
    <!--
      This is a special file. It handles all 404 requests on DigitalOcean's App
      Platform by redirecting them to index.html so that the App Platform
      delivers the React app.
      
      Without this file, all non-root links (e.g.
      https://example.com/anything/after/the/tld) would just 404 without
      delivering the React app.

      This file has no effect in the dev env.
    -->
    <meta charset="utf-8">
    <title>Cardinal Apps</title>
    <script type="text/javascript">
      window.location.replace('https://account.cardinalapps.io?path=' + window.location.pathname + window.location.search)
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
