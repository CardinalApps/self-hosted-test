name: Init repo

description: Initialize the workspace for CI tasks by installing dependencies of all packages and building libraries.

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version-file: .nvmrc
        cache: 'pnpm'

    - name: Install workspace deps
      run: pnpm install --frozen-lockfile
      shell: bash

    - name: Build library packages
      run: pnpm --filter="./libraries/**" build
      shell: bash
