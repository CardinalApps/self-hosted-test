name: Init repo

description: Initialize the workspace for CI tasks by installing dependencies of all packages and building libraries.

runs:
  using: composite
  steps:
    # Only GitHub-hosted runners (the OSS repo, forks) need pnpm bootstrapped;
    # the self-hosted pool already has it on PATH. Skipping the self-installer on
    # the pool avoids the shared-HOME ~/setup-pnpm race that crashed concurrent
    # matrix jobs (ENOTEMPTY). pnpm's shared on-disk store is concurrency-safe.
    - name: Setup pnpm
      if: runner.environment == 'github-hosted'
      uses: pnpm/action-setup@v4

    # No `cache: pnpm`: on the self-hosted pool it races the shared on-disk store
    # (restore/save fights concurrent installs), and the pool keeps that store
    # warm on its own. Hosted runners are ephemeral, so a cache would be cold.
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version-file: .nvmrc

    - name: Install workspace deps
      run: pnpm install --frozen-lockfile
      shell: bash

    - name: Build library packages
      run: pnpm --filter="./libraries/**" build
      shell: bash
