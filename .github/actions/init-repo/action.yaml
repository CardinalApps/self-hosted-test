name: Init repo

description: Initialize the workspace for CI tasks by installing dependencies of all packages and building libraries.

runs:
  using: composite
  steps:
    # Installs the pnpm version pinned by package.json's packageManager field.
    # Required on GitHub-hosted runners, harmless on the self-hosted pool.
    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    # No `cache: pnpm` here: the self-hosted pool already keeps a warm pnpm
    # store on local disk, shared across concurrent matrix jobs. Letting
    # setup-node restore/save a store tarball on top of that races the shared
    # store (ENOENT on copy) and the post-step save fails path validation.
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version-file: .nvmrc

    - name: Install workspace deps
      run: pnpm install --frozen-lockfile
      shell: bash

    - name: Build library packages
      run: pnpm --filter="./libraries/**" build
      shell: bash
