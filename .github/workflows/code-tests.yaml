name: 🩻 Code Tests

on:
  push:
    paths:
      - 'apps/**'
      - 'config/**'
      - 'libraries/**'
      - 'servers/**'

jobs:
  discover:
    name: Discover packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.discover.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install workspace deps
        run: pnpm i

      - name: Discover packages
        id: discover
        run: |
          PKGS=$(pnpm ls -r --depth -1 --json | node -e "
            const fs = require('fs');
            const pkgs = JSON.parse(fs.readFileSync('/dev/stdin', 'utf8'));
            const result = pkgs
              .filter(p => p.path !== process.cwd())
              .filter(p => {
                try {
                  const s = JSON.parse(fs.readFileSync(p.path + '/package.json', 'utf8')).scripts || {};
                  return 'test' in s;
                } catch { return false; }
              })
              .map(p => ({ name: p.name, label: p.name.replace(/^[^/]+\//, '') }));
            process.stdout.write(JSON.stringify(result));
          ")
          echo "packages=$PKGS" >> $GITHUB_OUTPUT

  test:
    name: "Test (${{ matrix.package.label }})"
    runs-on: ubuntu-latest
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.discover.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init repo
        uses: ./.github/actions/init-repo

      - name: Test
        run: pnpm --filter="${{ matrix.package.name }}" test

  validate:
    name: Code Tests
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            exit 1
          fi
