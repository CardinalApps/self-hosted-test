name: 📫 Publish OSS (Cherry-Pick)

on:
  workflow_dispatch:

env:
  ORG_NAME: CardinalApps
  OSS_REPO_NAME: self-hosted
  PRIVATE_REPO_NAME: ${{ github.event.repository.name }}
  GITHUB_TOKEN: ${{ secrets.PAT_PUBLISH_OSS }}

  # Caution! ¡Precaución! Försiktighet! Προσοχή! Forsigtighed!
  #
  # This is the source of truth for which code becomes open source and
  # which code stays private. Only add things to this list that are
  # meant to be published to the world.
  #
  # This list is fully opt-in — only paths listed here are published.
  # Both directories (e.g. apps/cinema-web) and individual files are
  # supported, as are glob patterns (e.g. .github/workflows/code-*.yaml).
  # Top-level files must be listed explicitly.
  OSS_PATHS: |
    .github/actions
    .github/workflows/code-*.yaml
    .vscode
    apps/admin-web
    apps/cinema-web
    apps/music-web
    apps/photos-web
    compose
    config
    docs/access-control.md
    docs/contributors.md
    docs/quick-start.md
    libraries/access-control
    libraries/app-settings
    libraries/products
    libraries/topology
    libraries/types
    libraries/ui
    servers/media
    .dockerignore
    .gitignore
    .npmrc
    CLAUDE.md
    CODEOWNERS.md
    Dockerfile.media-server
    LICENSE
    package.json
    pnpm-lock.yaml
    pnpm-workspace.yaml
    README.oss.md
    turbo.json

jobs:
  publish-oss:
    name: Publish to OSS repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo with full history
        uses: actions/checkout@v4
        with:
          path: private-repo
          fetch-depth: 0

      - name: Checkout OSS repository
        run: |
          git config --global user.name "BirbBot"
          git config --global user.email "ci@cardinalapps.io"
          git clone https://${{ env.ORG_NAME }}:${{ secrets.PAT_PUBLISH_OSS }}@github.com/${{ env.ORG_NAME }}/${{ env.OSS_REPO_NAME }}.git oss-repo

      - name: Cherry-pick OSS commits
        run: |
          # Find the last private repo SHA that was published to the OSS repo.
          # Each commit we create includes an "internal-repo-sha" trailer so we
          # can resume from the right place on subsequent runs.
          LAST_PRIVATE_SHA=$(git -C oss-repo log --format="%B" -1 | grep "^internal-repo-sha:" | cut -d' ' -f2 || true)
          echo "Last published SHA: ${LAST_PRIVATE_SHA:-none}"

          # Expand any glob patterns against the private repo's tracked files
          OSS_PATHS_ARRAY=()
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            if [[ "$line" == *"*"* || "$line" == *"?"* ]]; then
              while IFS= read -r expanded; do
                OSS_PATHS_ARRAY+=("$expanded")
              done < <(git -C private-repo ls-files -- "$line")
            else
              OSS_PATHS_ARRAY+=("$line")
            fi
          done <<< "$OSS_PATHS"

          echo "Resolved ${#OSS_PATHS_ARRAY[@]} OSS path(s)"

          # Collect commits from the private repo that touched OSS paths, in
          # chronological order. If this is not the first run, start from where
          # we left off; otherwise replay the full history.
          if [ -n "$LAST_PRIVATE_SHA" ]; then
            mapfile -t COMMITS < <(git -C private-repo log --reverse --no-merges --format="%H" "${LAST_PRIVATE_SHA}..HEAD" -- "${OSS_PATHS_ARRAY[@]}")
          else
            mapfile -t COMMITS < <(git -C private-repo log --reverse --no-merges --format="%H" -- "${OSS_PATHS_ARRAY[@]}")
          fi

          echo "Found ${#COMMITS[@]} candidate commit(s)"
          COMMIT_COUNT=0

          for COMMIT in "${COMMITS[@]}"; do
            SUBJECT=$(git -C private-repo log -1 --format="%s" "$COMMIT")

            # Skip commits explicitly marked as private
            if [[ "$SUBJECT" == private:* ]]; then
              echo "Skipping private: commit $COMMIT"
              continue
            fi

            # Generate a patch scoped to only the OSS paths. A commit may have
            # touched both private and OSS files; we only want the OSS diff.
            PATCH=$(git -C private-repo show "$COMMIT" -- "${OSS_PATHS_ARRAY[@]}" 2>/dev/null)

            if ! echo "$PATCH" | grep -q "^diff --git"; then
              echo "Skipping $COMMIT — no OSS file changes after filtering"
              continue
            fi

            # Remap README.oss.md to README.md in the patch
            PATCH=$(echo "$PATCH" | sed 's|README\.oss\.md|README.md|g')

            echo "$PATCH" | git -C oss-repo apply --allow-empty - 2>/dev/null || {
              echo "WARNING: Clean apply failed for $COMMIT, retrying with --reject"
              echo "$PATCH" | git -C oss-repo apply --reject --allow-empty - 2>/dev/null || true
            }

            git -C oss-repo add .

            if git -C oss-repo diff --staged --quiet; then
              echo "Skipping $COMMIT — nothing staged after apply"
              continue
            fi

            AUTHOR_NAME=$(git -C private-repo log -1 --format="%an" "$COMMIT")
            AUTHOR_EMAIL=$(git -C private-repo log -1 --format="%ae" "$COMMIT")
            AUTHOR_DATE=$(git -C private-repo log -1 --format="%aI" "$COMMIT")
            COMMIT_MSG=$(git -C private-repo log -1 --format="%B" "$COMMIT")

            # Move Co-authored-by lines after internal-repo-sha. Git only reads
            # trailers from the final paragraph, so they must come last.
            TRAILERS=$(echo "$COMMIT_MSG" | grep -i "^Co-authored-by:" || true)
            BASE_MSG=$(echo "$COMMIT_MSG" | grep -iv "^Co-authored-by:" | sed 's/[[:space:]]*$//')
            FULL_MSG="${BASE_MSG}"$'\n\n'"internal-repo-sha: ${COMMIT}"
            if [ -n "$TRAILERS" ]; then
              FULL_MSG="${FULL_MSG}"$'\n'"${TRAILERS}"
            fi

            GIT_AUTHOR_NAME="$AUTHOR_NAME" \
            GIT_AUTHOR_EMAIL="$AUTHOR_EMAIL" \
            GIT_AUTHOR_DATE="$AUTHOR_DATE" \
            GIT_COMMITTER_NAME="$AUTHOR_NAME" \
            GIT_COMMITTER_EMAIL="$AUTHOR_EMAIL" \
              git -C oss-repo commit -m "${FULL_MSG}"

            echo "Replayed: $COMMIT ($SUBJECT)"
            COMMIT_COUNT=$((COMMIT_COUNT + 1))
          done

          # Remove any files in the OSS repo that are no longer covered by OSS_PATHS.
          # This handles the case where a path is removed from the list.
          STALE_FILES=()
          while IFS= read -r tracked_file; do
            covered=false
            for oss_path in "${OSS_PATHS_ARRAY[@]}"; do
              # README.oss.md is published as README.md in the OSS repo
              [[ "$oss_path" == "README.oss.md" ]] && oss_path="README.md"
              if [[ "$tracked_file" == "$oss_path" || "$tracked_file" == "$oss_path/"* ]]; then
                covered=true
                break
              fi
            done
            $covered || STALE_FILES+=("$tracked_file")
          done < <(git -C oss-repo ls-files)

          if [ ${#STALE_FILES[@]} -gt 0 ]; then
            echo "Removing ${#STALE_FILES[@]} stale file(s) no longer in OSS_PATHS:"
            for f in "${STALE_FILES[@]}"; do
              echo "  $f"
              git -C oss-repo rm -f "$f"
            done
            git -C oss-repo commit -m "chore: remove files no longer in OSS_PATHS"
            COMMIT_COUNT=$((COMMIT_COUNT + 1))
          fi

          echo "Total commits replayed: $COMMIT_COUNT"
          echo "COMMIT_COUNT=$COMMIT_COUNT" >> "$GITHUB_ENV"

      - name: Create PR in OSS repo
        run: |
          # Nothing to publish — skip PR creation entirely
          if [ "${COMMIT_COUNT:-0}" -eq 0 ]; then
            echo "No OSS commits to publish"
            exit 0
          fi

          PRIVATE_SHA=$(git -C private-repo rev-parse HEAD)
          PRIVATE_SHA_SHORT=$(git -C private-repo rev-parse --short HEAD)
          PRIVATE_BRANCH_NAME=$(git -C private-repo rev-parse --abbrev-ref HEAD)
          PUBLISH_DATE=$(date +%Y-%m-%dT%H:%M:%S)

          BRANCH_NAME="publish/self-hosted/${PRIVATE_SHA_SHORT}"
          git -C oss-repo checkout -b "$BRANCH_NAME"
          git -C oss-repo push -u origin "$BRANCH_NAME" 2>/dev/null

          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.PAT_PUBLISH_OSS }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ env.ORG_NAME }}/${{ env.OSS_REPO_NAME }}/pulls \
            -d "{
              \"title\": \"Publish self-hosted code [${PRIVATE_BRANCH_NAME}] [${PRIVATE_SHA_SHORT}] [${PUBLISH_DATE}]\",
              \"body\": \"This PR was generated automatically. It contains ${COMMIT_COUNT} cherry-picked commit(s) from Cardinal's internal repository.\",
              \"head\": \"${BRANCH_NAME}\",
              \"base\": \"main\"
            }"
