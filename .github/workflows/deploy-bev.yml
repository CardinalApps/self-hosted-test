name: 🚢 Deploy BEV

on:
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy BEV
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init repo
        uses: ./.github/actions/init-repo

      - name: Build
        run: pnpm --filter="@cardinalapps/bev" build

      - name: Copy config
        run: cp ./apps/bev-web/staticwebapp.config.json ./apps/bev-web/build/staticwebapp.config.json

      # Docs: https://aka.ms/swaworkflowconfig
      - name: Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_KIND_SMOKE_00FDE270F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./apps/bev-web/build"
          skip_app_build: true
